name: Agent EOD Summary

on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch:

env:
  ORG_NAME: godseritesh

jobs:
  send-summary:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: |
          git fetch origin agent-state 2>/dev/null || true
          git show "origin/agent-state:agent-state.json" > agent-state.json 2>/dev/null || true
      - name: Send EOD summary email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python -c "import json; from agent.notify import build_summary, send_email; from pathlib import Path; p=Path('agent-state.json'); state=json.loads(p.read_text()) if p.exists() else {}; send_email('Agent Daily Summary', build_summary(state))"
