name: Agent - Weekly Code Index Build
on:
  schedule:
    - cron: "0 10 * * 0"  # Sundays 10:00 UTC
  workflow_dispatch:  # manual trigger too

env:
  ORG_NAME: godseritesh

jobs:
  build-indexes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install libcst  # AST parser for Python

      - name: Restore target repo cache
        uses: actions/cache@v5
        with:
          path: /tmp/agent-repos
          key: agent-repos-weekly-${{ github.run_id }}
          restore-keys: |
            agent-repos-weekly-
          enableCrossOsArchive: true

      - name: Fetch state and previous indexes
        run: |
          shopt -s nullglob
          git fetch origin agent-state 2>/dev/null || true
          for f in INDEX-*.json; do
            git show "origin/agent-state:$f" > "$f" 2>/dev/null || true
          done

      - name: Build indexes for all active repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python agent/build_indexes.py

      - name: Push indexes to agent-state branch
        run: |
          git config user.name "godseritesh"
          git config user.email "riteshgodse008@gmail.com"
          shopt -s nullglob
          # Copy index files to tmp dir, switch to agent-state branch, restore them
          mkdir -p /tmp/indexes
          cp INDEX-*.json /tmp/indexes/ 2>/dev/null || true
          git fetch origin agent-state
          git checkout agent-state 2>/dev/null || git checkout --orphan agent-state
          # Remove all tracked files, keep only the index files
          git rm -rf --quiet . 2>/dev/null || true
          cp /tmp/indexes/INDEX-*.json . 2>/dev/null || true
          git add INDEX-*.json
          git diff --cached --quiet || git commit -m "update indexes [skip ci]"
          git push origin HEAD:agent-state --force
