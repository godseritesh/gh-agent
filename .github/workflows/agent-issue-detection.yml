name: Agent - Issue Detection
on:
  push:
    branches: [master]
  issues:
    types: [opened, labeled]
  pull_request_target:
    types: [opened, synchronize]
  workflow_dispatch:

env:
  ORG_NAME: godseritesh

jobs:
  detect:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install agent
        run: pip install -e ".[dev]"

      - name: Restore target repo cache
        uses: actions/cache@v4
        with:
          path: /tmp/agent-repos
          key: agent-repos-${{ github.run_id }}
          restore-keys: |
            agent-repos-
          enableCrossOsArchive: true

      - name: Fetch state
        run: |
          git fetch origin agent-state 2>/dev/null || git branch agent-state HEAD
          git show origin/agent-state:agent-state.json > agent-state.json 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name "gh-agent[bot]"
          git config user.email "gh-agent[bot]@users.noreply.github.com"

      - name: Run detection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AGENT_REPO_DIR: ${{ github.workspace }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python -m agent.main

      - name: Push state
        run: |
          git add agent-state.json 2>/dev/null || true
          git commit -m "update state [skip ci]" 2>/dev/null || true
          git push origin HEAD:agent-state 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
