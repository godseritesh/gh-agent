name: Agent - Proactive Research & Development
on:
  schedule:
    - cron: "0 14 * * 1-5"  # weekdays 7:30pm IST (14:00 UTC)
  workflow_dispatch:
    inputs:
      repo:
        description: "Specific repo (leave empty for auto-pick)"
        required: false
        type: string

env:
  ORG_NAME: godseritesh

jobs:
  research-and-implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    environment: prod
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install agent
        run: pip install -e ".[dev]"

      - name: Restore target repo cache
        uses: actions/cache@v5
        with:
          path: /tmp/agent-repos
          key: agent-repos-${{ github.run_id }}
          restore-keys: |
            agent-repos-
          enableCrossOsArchive: true

      - name: Fetch state from agent-state branch
        run: |
          git fetch origin agent-state 2>/dev/null || true
          for f in agent-state.json AGENTS-*.md; do
            git show "origin/agent-state:$f" > "$f" 2>/dev/null || true
          done

      - name: Configure git
        run: |
          git config user.name "godseritesh"
          git config user.email "riteshgodse008@gmail.com"

      - name: Research & implement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AGENT_REPO_DIR: ${{ github.workspace }}
          REPO_NAME: ${{ inputs.repo || '' }}
        run: python -m agent.main

      - name: Push state + AGENTS.md to agent-state branch
        run: |
          git add agent-state.json AGENTS-*.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git push origin HEAD:agent-state 2>/dev/null || true
