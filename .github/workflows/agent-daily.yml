name: Agent - Daily Scan
on:
  schedule:
    - cron: "0 8 * * 1-5"  # weekdays 8am UTC
  workflow_dispatch:

env:
  ORG_NAME: godseritesh

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for state branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install agent
        run: pip install -e ".[dev]"

      - name: Restore target repo cache
        uses: actions/cache@v4
        with:
          path: /tmp/agent-repos
          key: agent-repos-${{ github.run_id }}
          restore-keys: |
            agent-repos-
          enableCrossOsArchive: true

      - name: Fetch state from agent-state branch
        run: |
          git fetch origin agent-state 2>/dev/null || git branch agent-state HEAD
          git show origin/agent-state:agent-state.json > agent-state.json 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for state pushes
        run: |
          git config user.name "gh-agent[bot]"
          git config user.email "gh-agent[bot]@users.noreply.github.com"

      - name: Run daily scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AGENT_REPO_DIR: ${{ github.workspace }}
        run: python -m agent.main

      - name: Push updated state to agent-state branch
        run: |
          git add agent-state.json 2>/dev/null || true
          git commit -m "update state [skip ci]" 2>/dev/null || true
          git push origin HEAD:agent-state 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
